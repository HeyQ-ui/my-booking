<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约信息填写</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 32px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 520px;
            width: 90vw;
        }

        h1 {
            color: #333;
            margin-bottom: 24px;
            font-size: 22px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #006633;
        }

        .venue-group {
            margin-bottom: 16px;
        }

        .venue-name {
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .session-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .session-card {
            flex: 1 1 auto;
            min-width: 130px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            background: #fafafa;
            font-size: 14px;
            color: #333;
            user-select: none;
        }

        .session-card:hover {
            border-color: #006633;
            background: #f0faf3;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 102, 51, 0.15);
        }

        .session-card.selected {
            border-color: #006633;
            background: #e6f3ed;
            color: #004d26;
            font-weight: 600;
            box-shadow: 0 0 0 1px #006633;
        }

        .session-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: #e0e0e0;
            color: #666;
            margin-left: 6px;
            vertical-align: middle;
        }

        .session-card.selected .session-tag {
            background: #006633;
            color: #fff;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
        }

        .enter-btn {
            background: #006633;
            color: white;
            border: none;
            padding: 14px 48px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .enter-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 102, 51, 0.4);
        }

        .enter-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 14px 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #006633;
        }

        .divider {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>填写预约信息</h1>

        <div class="form-group">
            <label for="date-input">预约日期</label>
            <input type="date" id="date-input">
        </div>

        <hr class="divider">

        <div class="form-group">
            <label>选择场次</label>
            <div id="venue-list"></div>
        </div>

        <div class="btn-row">
            <span class="back-link" onclick="goBack()">返回</span>
            <button class="enter-btn" id="confirm-btn" disabled onclick="confirmBooking()">确认预约</button>
        </div>
    </div>

    <script>
        // === 场次数据（来自场馆预约信息.xlsx） ===
        var sessions = [
            { venue: "南校园新体育馆健身房", type: "周中", time: "18:00-20:00" },
            { venue: "南校园新体育馆健身房", type: "周中", time: "20:00-22:00" },
            { venue: "南校园新体育馆健身房", type: "周末", time: "10:00-12:00" },
            { venue: "南校园新体育馆健身房", type: "周末", time: "14:00-16:00" },
            { venue: "南校园新体育馆健身房", type: "周末", time: "16:00-18:00" },
            { venue: "南校园新体育馆健身房", type: "周末", time: "18:00-20:00" },
            { venue: "南校园新体育馆健身房", type: "周末", time: "20:00-22:00" },
            { venue: "南校园游泳池", type: "周末/周中", time: "06:30-08:00" },
            { venue: "南校园游泳池", type: "周末/周中", time: "16:30-18:00" },
            { venue: "南校园游泳池", type: "周末/周中", time: "19:30-21:00" }
        ];

        var selectedVenue = null;
        var selectedTime = null;
        var selectedType = null;

        function todayLocalStr() {
            var d = new Date();
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        // 初始化日期
        var dateInput = document.getElementById('date-input');
        dateInput.value = todayLocalStr();

        // 从 URL 读取已选日期（从 index.html 跳转过来）
        var params = new URLSearchParams(window.location.search);
        if (params.get('date')) {
            dateInput.value = params.get('date');
        }

        // 渲染场次列表（按场馆分组）
        function renderSessions() {
            var venueMap = {};
            sessions.forEach(function(s) {
                if (!venueMap[s.venue]) {
                    venueMap[s.venue] = [];
                }
                venueMap[s.venue].push(s);
            });

            var html = '';
            for (var venue in venueMap) {
                html += '<div class="venue-group">';
                html += '<div class="venue-name">' + venue + '</div>';
                html += '<div class="session-list">';
                venueMap[venue].forEach(function(s) {
                    var id = 'sess_' + s.venue.replace(/\s/g, '_') + '_' + s.time.replace(/[:\-]/g, '');
                    html += '<div class="session-card" id="' + id + '" ';
                    html += 'onclick="selectSession(\'' + id + '\', \'' + s.venue.replace(/'/g, "\\'") + '\', \'' + s.time + '\', \'' + s.type + '\')">';
                    html += s.time;
                    html += '<span class="session-tag">' + s.type + '</span>';
                    html += '</div>';
                });
                html += '</div></div>';
            }
            document.getElementById('venue-list').innerHTML = html;
        }

        function selectSession(id, venue, time, type) {
            // 清除旧选中
            var cards = document.querySelectorAll('.session-card');
            cards.forEach(function(c) { c.classList.remove('selected'); });

            // 设置新选中
            document.getElementById(id).classList.add('selected');
            selectedVenue = venue;
            selectedTime = time;
            selectedType = type;

            // 启用确认按钮
            document.getElementById('confirm-btn').disabled = false;
        }

        function confirmBooking() {
            var date = dateInput.value;
            if (!date) {
                alert('请选择预约日期');
                return;
            }
            if (!selectedVenue || !selectedTime) {
                alert('请选择场次');
                return;
            }
            var url = '我的预约.html?date=' + encodeURIComponent(date)
                + '&venue=' + encodeURIComponent(selectedVenue)
                + '&time=' + encodeURIComponent(selectedTime)
                + '&type=' + encodeURIComponent(selectedType);
            window.location.href = url;
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        renderSessions();
    </script>
</body>
</html>
